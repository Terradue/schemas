            data:
              title: FailedData
              allOf:
                - title: BaseData
                  type: object
                  required:
                    - namespace
                  properties:
                    namespace:
                      type: string
                      description: >-
                        The declarative region that provides a scope to the
                        processes.
                    process_id:
                      type: string
                      description: The unique Process identifier inside the namespace.
                    job_id:
                      type: string
                      description: The unique Job identifier inside the namespace.
                    properties:
                      type: object
                      additionalProperties: true
                      description: The properties that describe the process.
                    priority:
                      type: string
                      description: The right to proceed before other executions.
                - type: object
                  required:
                    - job_id
                    - process_id
                    - usage
                  properties:
                    exception:
                      title: Exception Schema
                      description: >-
                        The `exception` object provides detailed information
                        about an errors that occurred during an API call
                        execution. This problem object conforms to the
                        [RFC9457](https://www.rfc-editor.org/info/rfc9457)
                        (formerly
                        [RFC7807](https://tools.ietf.org/html/rfc7807)).

                        The object is extended with the following properties: -
                        `code` - a string identifier to aid the provider team
                        better understand the error - `errors` - and array of
                        errors providing contextual information on the root
                        cause of the problem

                        The `exception` referenced by this domain utilize a
                        custom Terradue Problems Registry.
                      type: object
                      required:
                        - type
                      properties:
                        type:
                          type: string
                          description: A URI reference that identifies the problem type.
                          format: uri
                          pattern: https://mate.terradue.com/.+
                          maxLength: 1024
                        status:
                          type: integer
                          description: >-
                            The HTTP status code generated by the origin server
                            for this occurrence of the problem.
                          format: int32
                          minimum: 100
                          maximum: 599
                        title:
                          type: string
                          description: >-
                            A short, human-readable summary of the problem type.
                            It should not change from occurrence to occurrence
                            of the problem, except for purposes of localization.
                          maxLength: 1024
                        detail:
                          type: string
                          description: >-
                            A human-readable explanation specific to this
                            occurrence of the problem.
                          maxLength: 4096
                        instance:
                          type: string
                          description: >-
                            A URI reference that identifies the specific
                            occurrence of the problem. It may or may not yield
                            further information if dereferenced.
                          maxLength: 1024
                        code:
                          type: string
                          description: >-
                            An API specific error code aiding the provider team
                            understand the error based on their own potential
                            taxonomy or registry.
                          maxLength: 50
                        errors:
                          type: array
                          description: >-
                            An array of error details to accompany a problem
                            details response.
                          maxItems: 1000
                          items:
                            type: object
                            description: >-
                              An object to provide explicit details on a problem
                              towards an API consumer.
                            required:
                              - detail
                            properties:
                              detail:
                                type: string
                                description: >-
                                  A granular description on the specific error
                                  related to a body property, query parameter,
                                  path parameters, and/or header.
                                maxLength: 4096
                              pointer:
                                type: string
                                description: >-
                                  A JSON Pointer to a specific request body
                                  property that is the source of error.
                                maxLength: 1024
                              parameter:
                                type: string
                                description: >-
                                  The name of the query or path parameter that
                                  is the source of error.
                                maxLength: 1024
                              header:
                                type: string
                                description: >-
                                  The name of the header that is the source of
                                  error.
                                maxLength: 1024
                              code:
                                type: string
                                description: >-
                                  A string containing additional provider
                                  specific codes to identify the error context.
                                maxLength: 50
                    usage:
                      type: object
                      description: Report of a process total used resources.
                      properties:
                        start_time:
                          type: string
                          format: date-time
                          description: >
                            The execution start time, in the date-time notation
                            as defined by [RFC 3339, section
                            5.6](https://datatracker.ietf.org/doc/html/rfc3339#section-5.6).
                          example: '2025-03-11T16:20:36Z'
                        finish_time:
                          type: string
                          format: date-time
                          description: >
                            The execution finish time, in the date-time notation
                            as defined by [RFC 3339, section
                            5.6](https://datatracker.ietf.org/doc/html/rfc3339#section-5.6).
                          example: '2025-03-11T16:23:17Z'
                        elapsed_hours:
                          type: number
                          format: double
                          description: The execution elapsed hour(s).
                          example: 0.04472222222222222
                        elapsed_seconds:
                          type: integer
                          format: int32
                          description: The execution elapsed second(s).
                          example: 161
                        cores_allowed:
                          type: number
                          format: double
                          description: >-
                            The maximum number of Central Processing Unit cores
                            to use.
                          example: 8
                        max_parallel_cpus:
