asyncapi: 3.1.0
info:
  title: Calrimate - Stages notification events
  version: 1.0.0
  description: This API provides real-time Calrimate events streaming capabilities.
  contact:
    name: Terradue
    email: info@terradue.com
  license:
    name: Creative Commons Attribution-ShareAlike 4.0 International
    url: https://creativecommons.org/licenses/by-sa/4.0/
  externalDocs:
    description: Argo Events
    url: https://argoproj.github.io/argo-events/
defaultContentType: application/json
servers:
  production:
    host: kafka-cluster-kafka-bootstrap.events.svc.cluster.local:9092
    pathname: event-bus
    protocol: kafka
    protocolVersion: '1.0'
    description: Production Apache Kafka broker.
    title: event-bus Server
    summary: event-bus environment server
    externalDocs:
      description: Apache Kafka
      url: https://kafka.apache.org/
    bindings:
      kafka:
        bindingVersion: 0.5.0
channels:
  Calendar:
    address: '{workflow.namespace}.{workflow.uid}.{time.reference}.calendar'
    parameters:
      workflow.namespace:
        description: The namespace where workflows are executed.
      workflow.uid:
        description: The executed workflow UID.
      time.reference:
        description: The tiome reference
    messages:
      defaultMessage:
        name: CalendarEvent
        payload:
          title: CalendarEvent
          type: object
          allOf:
            - title: BaseCloudEvent
              type: object
              required:
                - specversion
                - source
                - subject
                - id
                - time
                - datacontenttype
              properties:
                specversion:
                  type: string
                  const: '1.0'
                source:
                  type: string
                  pattern: ^[^:]+:[^:]+:[^:]+:[^:]+$
                  description: >
                    Identifies the context in which an event happened.


                    Pattern is
                    `{{workflow.annotations.calrimate.terradue.com/source}}:{{workflow.namespace}}:{{workflow.annotations.eoap.ogc.org/id}}:{{steps.name}}`.
                subject:
                  type: string
                  pattern: ^[^:]+:[^:]+:[^:]+$
                  description: >
                    The subject of the event in the context of the event
                    producer (identified by `source`).


                    Pattern is
                    `{{workflow.namespace}}:{{workflow.uid}}:{{workflow.name}}`.
                partitionkey:
                  type: string
                  description: >
                    A partition key for the event, typically for the purposes of
                    defining a causal relationship/grouping between multiple
                    events.


                    _Implementors note_: set it equals to the subject by
                    default.
                id:
                  type: string
                time:
                  type: string
                  format: date-time
                datacontenttype:
                  type: string
                  const: application/json
              additionalProperties: false
          required:
            - type
            - data
          properties:
            type:
              type: string
              const: calendar-event
            data:
              title: CalendarData
              allOf:
                - title: BaseData
                  type: object
                  required:
                    - namespace
                  properties:
                    namespace:
                      type: string
                      description: >-
                        The declarative region that provides a scope to the
                        processes.
                    process_id:
                      type: string
                      description: The unique Process identifier inside the namespace.
                    job_id:
                      type: string
                      description: The unique Job identifier inside the namespace.
                    properties:
                      type: object
                      additionalProperties: true
                      description: The properties that describe the process.
                    priority:
                      type: string
                      description: The right to proceed before other executions.
                - type: object
                  required:
                    - event_time
                    - start_time
                    - end_time
                  properties:
                    event_time:
                      type: string
                      format: date-time
                      description: The Argo Events event time, in ISO string format.
                    start_time:
                      type: string
                      format: date-time
                      description: The Start Time event, in ISO string format.
                    end_time:
                      type: string
                      format: date-time
                      description: The End Time event, in ISO string format.
                  additionalProperties: false
          additionalProperties: false
        examples:
          - name: Calendar
            payload:
              specversion: '1.0'
              id: 74018372-9623-463e-ab4b-3fdd99467878
              time: '2019-08-24T14:15:22Z'
              datacontenttype: application/json
              source: seda:workflows:scan-calendar:5s
              type: calendar-event
              subject: workflows:scan-calendar:5s
              partitionkey: workflows:scan-calendar:5s
              data:
                end_time: '2026-02-10T13:32:13Z'
                event_time: '2026-02-10T13:32:13Z'
                start_time: '2026-02-10T13:32:08Z'
  Prepared:
    address: '{workflow.namespace}.{workflow.uid}.prepared'
    parameters:
      workflow.namespace:
        description: The namespace where workflows are executed.
      workflow.uid:
        description: The executed workflow UID.
    messages:
