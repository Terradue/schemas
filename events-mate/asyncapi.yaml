                  additionalProperties: false
          additionalProperties: false
        examples:
          - name: Prepared
            payload:
              specversion: '1.0'
              id: 74018372-9623-463e-ab4b-3fdd99467878
              time: '2019-08-24T14:15:22Z'
              datacontenttype: application/json
              source: seda-dev-platform:workflows:pattern-1-v0-2-0:get-results
              type: prepared
              subject: >-
                workflows:10d6fec5-b064-4373-bb60-5060ce39d682:pattern-1-v0-2-0-62cpk
              partitionkey: >-
                workflows:10d6fec5-b064-4373-bb60-5060ce39d682:pattern-1-v0-2-0-62cpk
              data:
                job_id: pattern-1
                namespace: alice
                inputs:
                  aoi: '-118.985,38.432,-118.183,38.938'
                  epsg: EPSG:4326
                  bands:
                    - green
                    - nir08
                  item: >-
                    https://raw.githubusercontent.com/stac-utils/stac-examples/refs/heads/main/sentinel2/sentinel2-sample.json
  Completed:
    address: '{workflow.namespace}.{workflow.uid}.completed'
    parameters:
      workflow.namespace:
        description: The namespace where workflows are executed.
      workflow.uid:
        description: The executed workflow UID.
    messages:
      defaultMessage:
        name: CompletedEvent
        payload:
          title: CompletedEvent
          type: object
          allOf:
            - title: BaseCloudEvent
              type: object
              required:
                - specversion
                - source
                - subject
                - id
                - time
                - datacontenttype
              properties:
                specversion:
                  type: string
                  const: '1.0'
                source:
                  type: string
                  pattern: ^[^:]+:[^:]+:[^:]+:[^:]+$
                  description: >
                    Identifies the context in which an event happened.


                    Pattern is
                    `{{workflow.annotations.calrimate.terradue.com/source}}:{{workflow.namespace}}:{{workflow.annotations.eoap.ogc.org/id}}:{{steps.name}}`.
                subject:
                  type: string
                  pattern: ^[^:]+:[^:]+:[^:]+$
                  description: >
                    The subject of the event in the context of the event
                    producer (identified by `source`).


                    Pattern is
                    `{{workflow.namespace}}:{{workflow.uid}}:{{workflow.name}}`.
                partitionkey:
                  type: string
                  description: >
                    A partition key for the event, typically for the purposes of
                    defining a causal relationship/grouping between multiple
                    events.


                    _Implementors note_: set it equals to the subject by
                    default.
                id:
                  type: string
                time:
                  type: string
                  format: date-time
                datacontenttype:
                  type: string
                  const: application/json
              additionalProperties: false
          required:
            - type
            - data
          properties:
            type:
              type: string
              const: completed
            data:
              title: CompletedData
              allOf:
                - title: BaseData
                  type: object
                  required:
                    - namespace
                  properties:
                    namespace:
                      type: string
                      description: >-
                        The declarative region that provides a scope to the
                        processes.
                    process_id:
                      type: string
                      description: The unique Process identifier inside the namespace.
                    job_id:
                      type: string
                      description: The unique Job identifier inside the namespace.
                    properties:
                      type: object
                      additionalProperties: true
                      description: The properties that describe the process.
                    priority:
                      type: string
                      description: The right to proceed before other executions.
                - type: object
                  required:
                    - job_id
                    - process_id
                    - usage
                    - outputs
                  properties:
                    usage:
                      type: object
                      description: Report of a process total used resources.
                      properties:
                        start_time:
                          type: string
                          format: date-time
                          description: >
                            The execution start time, in the date-time notation
                            as defined by [RFC 3339, section
                            5.6](https://datatracker.ietf.org/doc/html/rfc3339#section-5.6).
                          example: '2025-03-11T16:20:36Z'
                        finish_time:
                          type: string
                          format: date-time
                          description: >
                            The execution finish time, in the date-time notation
                            as defined by [RFC 3339, section
                            5.6](https://datatracker.ietf.org/doc/html/rfc3339#section-5.6).
                          example: '2025-03-11T16:23:17Z'
                        elapsed_hours:
                          type: number
                          format: double
                          description: The execution elapsed hour(s).
                          example: 0.04472222222222222
                        elapsed_seconds:
                          type: integer
                          format: int32
                          description: The execution elapsed second(s).
                          example: 161
                        cores_allowed:
                          type: number
                          format: double
                          description: >-
                            The maximum number of Central Processing Unit cores
                            to use.
                          example: 8
                        max_parallel_cpus:
                          type: integer
                          format: int32
                          description: >-
                            The maximum number of used Central Processing Unit
                            cores.
                          example: 7
                        total_cpu_hours:
                          type: number
                          format: double
                          description: >-
                            The number of used Central Processing Unit cores per
                            hour.
                          example: 0.21305555555555555
                        ram_mb_allowed:
                          type: number
                          format: double
                          description: The maximum amount of RAM to use, in MegaBytes.
                          example: 4000
                        total_ram_megabyte_hours:
                          type: number
                          format: double
                          description: >-
                            The total size of the RAM used per hour for the
                            execution, in MegaBytes.
                          example: 114.3833304177778
                        max_parallel_ram_megabytes:
                          type: number
                          format: double
                          example: 3758.0963839999995
                        total_disk_megabytes:
                          type: number
                          format: double
                          description: >-
                            The total size of the Disk used per hour for the
                            execution, in MegaBytes.
                          example: 2490.712061999999
                        max_parallel_tasks:
                          type: integer
                          format: int32
                          description: The maximum number of parallel executing tasks.
                        total_tasks:
                          type: integer
                          format: int32
                          description: The total number of executed tasks.
                          example: 25
                        children:
                          type: array
                          items:
                            type: object
                            description: >-
                              Report of a child process execution used
                              resources.
                            properties:
                              name:
                                type: string
                                description: The name of the child process.
                                example: node_crop_6
                              start_time:
                                type: string
                                format: date-time
                                description: >
                                  The execution start time, in the date-time
                                  notation as defined by [RFC 3339, section
                                  5.6](https://datatracker.ietf.org/doc/html/rfc3339#section-5.6).
                                example: '2025-03-11T16:20:37Z'
                              finish_time:
                                type: string
                                format: date-time
                                description: >
                                  The execution finish time, in the date-time
                                  notation as defined by [RFC 3339, section
                                  5.6](https://datatracker.ietf.org/doc/html/rfc3339#section-5.6).
                                example: '2025-03-11T16:21:25Z'
                              elapsed_hours:
                                type: number
                                description: The execution elapsed hour(s).
                                example: 0.013333333333333334
                              elapsed_seconds:
                                type: number
                                description: The execution elapsed second(s).
                                format: double
                                example: 48
                              exit_code:
                                type: integer
                                format: int32
                                description: The executed child process exit code.
                              cpus:
                                type: number
                                format: double
                                description: >-
                                  The number of Central Processing Unit cores
                                  used for the execution.
                                example: 1
                              cpu_hours:
                                type: number
                                format: double
                                description: >-
                                  The number of Central Processing Unit cores
                                  used per hour for the execution.
                                example: 0.013333333333333334
                              ram_megabytes:
                                type: number
                                format: double
                                description: >-
                                  The size of the RAM used for the execution, in
                                  MegaBytes.
                                example: 536.870912
                              ram_megabyte_hours:
                                type: number
                                format: double
                                description: >-
                                  The size of the RAM used per hour for the
                                  execution, in MegaBytes.
                                example: 7.158278826666667
                              disk_megabytes:
                                type: number
                                format: double
                                description: >-
                                  The size of the Disk used for the execution,
                                  in MegaBytes.
                                example: 99.962848
                          description: The executed tasks.
                          example:
                            - cpus: 1
                              ram_megabytes: 536.870912
                              disk_megabytes: 99.962848
                              exit_code: 0
                              name: node_crop_6
                              start_time: '2025-03-11T16:20:37Z'
                              finish_time: '2025-03-11T16:21:25Z'
                              elapsed_hours: 0.013333333333333334
                              elapsed_seconds: 48
                              ram_megabyte_hours: 7.158278826666667
                              cpu_hours: 0.013333333333333334
                    outputs:
                      type: object
                      additionalProperties: true
                      description: >-
                        The dictionary that describes outputs identifiers with
                        related values.
                  additionalProperties: false
          additionalProperties: false
        examples:
          - name: Completed
            payload:
              specversion: '1.0'
              id: 74018372-9623-463e-ab4b-3fdd99467878
              time: '2019-08-24T14:15:22Z'
              datacontenttype: application/json
              source: seda-dev-platform:workflows:pattern-1-v0-2-0:get-results
              type: completed
              subject: >-
                workflows:10d6fec5-b064-4373-bb60-5060ce39d682:pattern-1-v0-2-0-62cpk
              partitionkey: >-
                workflows:10d6fec5-b064-4373-bb60-5060ce39d682:pattern-1-v0-2-0-62cpk
              data:
                job_id: pattern-1
                namespace: alice
                usage:
                  cores_allowed: 8
                  ram_mb_allowed: 4000
                  children:
                    - cpus: 1
                      ram_megabytes: 536.870912
                      disk_megabytes: 99.962848
                      exit_code: 0
                      name: node_crop_6
                      start_time: '2025-03-11T16:20:37+00:00'
                      finish_time: '2025-03-11T16:21:25+00:00'
                      elapsed_hours: 0.013333333333333334
                      elapsed_seconds: 48
                      ram_megabyte_hours: 7.158278826666667
                      cpu_hours: 0.013333333333333334
                  start_time: '2025-03-11T16:20:36+00:00'
                  finish_time: '2025-03-11T16:23:17+00:00'
                  elapsed_hours: 0.04472222222222222
                  elapsed_seconds: 161
                  total_cpu_hours: 0.21305555555555555
                  total_ram_megabyte_hours: 114.3833304177778
                  total_disk_megabytes: 2490.712061999999
                  total_tasks: 25
                  max_parallel_cpus: 7
                  max_parallel_ram_megabytes: 3758.0963839999995
                  max_parallel_tasks: 0
                outputs:
                  water_bodies: >-
                    https://raw.githubusercontent.com/stac-utils/stac-examples/refs/heads/main/sentinel2/sentinel2-sample.json
  Failed:
