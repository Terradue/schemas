openapi: 3.0.0
info:
  version: 1.0.0
  title: OGC API - Processes
  description: This API provides real-time Calrimate events streaming capabilities.
  contact:
    name: Terradue
    email: info@terradue.com
  license:
    name: Creative Commons Attribution-ShareAlike 4.0 International
    url: https://creativecommons.org/licenses/by-sa/4.0/
servers:
  - description: Webhook exposed internal service
    url: http://cloud-events-webhook-eventsource-svc:12000
paths:
  /cloud-events:
    post:
      summary: Send CloudEvent.
      description: |
        Sends a structured-mode CloudEvent.

        For more information, see [CloudEvents - Version 1.0.2](https://github.com/cloudevents/spec/blob/v1.0.2/cloudevents/spec.md).
      operationId: sendCloudEvent
      parameters:
        - $ref: '#/components/parameters/X-Kafka-Topic'
      requestBody:
        description: A structured-mode CloudEvent.
        required: true
        content:
          application/cloudevents+json:
            schema:
              $ref: '#/components/schemas/CloudEvent'
            examples:
              Calendar:
                $ref: '#/components/examples/Calendar'
              Prepared:
                $ref: '#/components/examples/Prepared'
              Completed:
                $ref: '#/components/examples/Completed'
              Failed:
                $ref: '#/components/examples/Failed'
              Staged:
                $ref: '#/components/examples/Staged'
              Piped:
                $ref: '#/components/examples/Piped'
      responses:
        '200':
          $ref: '#/components/responses/WebhookOk'
components:
  parameters:
    X-Kafka-Topic:
      name: X-Kafka-Topic
      in: header
      schema:
        type: string
        pattern: ^[^.]+\.[^.]+\.(\d+[hmsd]\.calendar|prepared|completed|failed|piped|staged)$
      required: true
      description: |
        The named resource that serves as a feed for messages.

        Pattern is `{{workflow.namespace}}.{{workflow.uid}}.(\d+[hmsd]\.calendar|prepared|completed|failed|piped|staged)`, where:

        | Topic                                                         | Semantic                                                                                            |
        |---------------------------------------------------------------|-----------------------------------------------------------------------------------------------------|
        | `{{workflow.namespace}}.{{workflow.uid}}.\d+[hmsd].calendar`  | CWL and input parameters are wrapped w/ stage-in/out steps                                          |
        | `{{workflow.namespace}}.{{workflow.uid}}.prepared`            | CWL and input parameters are wrapped w/ stage-in/out steps                                          |
        | `{{workflow.namespace}}.{{workflow.uid}}.completed`           | Workflow completed its life cycle and CommandLineTools/Calrissian stderr/out logs are collected     |
        | `{{workflow.namespace}}.{{workflow.uid}}.failed`              | Workflow failed during its life cycle and CommandLineTools/Calrissian stderr/out logs are collected |
        | `{{workflow.namespace}}.{{workflow.uid}}.piped`               | Feature Collection is generated                                                                     |
        | `{{workflow.namespace}}.{{workflow.uid}}.staged`              | Results are posted in Catalog via `stac-postman`                                                    |
  schemas:
    CloudEvent:
      title: CloudEvent
      type: object
      required:
        - source
        - type
        - subject
        - partitionkey
        - data
      properties:
        source:
          type: string
          pattern: ^[^:]+:[^:]+:[^:]+:[^:]+$
          description: |
            Identifies the context in which an event happened.

            Pattern is `{{workflow.annotations.calrimate.terradue.com/source}}:{{workflow.namespace}}:{{workflow.annotations.eoap.ogc.org/id}}:{{steps.name}}`.
        type:
          type: string
          enum:
            - calendar-event
            - prepared
            - completed
            - failed
            - staged
            - piped
          description: |
            Contains a value describing the type of event related to the originating occurrence.
        subject:
          type: string
          pattern: ^[^:]+:[^:]+:[^:]+$
          description: |
            The subject of the event in the context of the event producer (identified by `source`).

            Pattern is `{{workflow.namespace}}:{{workflow.uid}}:{{workflow.name}}`.
        partitionkey:
          type: string
          description: |
            A partition key for the event, typically for the purposes of defining a causal relationship/grouping between multiple events.

            _Implementors note_: set it equals to the subject by default.
        data:
          oneOf:
            - $ref: '#/components/schemas/CalendarData'
            - $ref: '#/components/schemas/PreparedData'
            - $ref: '#/components/schemas/CompletedData'
            - $ref: '#/components/schemas/FailedData'
            - $ref: '#/components/schemas/StagedData'
            - $ref: '#/components/schemas/PipedData'
          description: The event payload.
    BaseData:
      title: BaseData
      type: object
      required:
        - namespace
      properties:
        namespace:
          type: string
          description: The declarative region that provides a scope to the processes.
        process_id:
          type: string
          description: The unique Process identifier inside the namespace.
        job_id:
          type: string
          description: The unique Job identifier inside the namespace.
        properties:
          type: object
          additionalProperties: true
          description: The properties that describe the process.
        priority:
          type: string
          description: The right to proceed before other executions.
    CalendarData:
      title: CalendarData
      allOf:
        - $ref: '#/components/schemas/BaseData'
        - type: object
          required:
            - event_time
            - start_time
            - end_time
          properties:
            event_time:
              type: string
              format: date-time
              description: The Argo Events event time, in ISO string format.
            start_time:
              type: string
              format: date-time
              description: The Start Time event, in ISO string format.
            end_time:
              type: string
              format: date-time
              description: The End Time event, in ISO string format.
          additionalProperties: false
    PreparedData:
      title: PreparedData
      allOf:
        - $ref: '#/components/schemas/BaseData'
        - type: object
          required:
            - job_id
            - process_id
            - inputs
          properties:
            inputs:
              type: object
              additionalProperties: true
              description: The dictionary that describes inputs identifiers with related values.
          additionalProperties: false
    Usage:
      type: object
      description: Report of a process total used resources.
      properties:
        start_time:
          type: string
          format: date-time
          description: |
            The execution start time, in the date-time notation as defined by [RFC 3339, section 5.6](https://datatracker.ietf.org/doc/html/rfc3339#section-5.6).
          example: '2025-03-11T16:20:36Z'
        finish_time:
          type: string
          format: date-time
          description: |
            The execution finish time, in the date-time notation as defined by [RFC 3339, section 5.6](https://datatracker.ietf.org/doc/html/rfc3339#section-5.6).
          example: '2025-03-11T16:23:17Z'
        elapsed_hours:
          type: number
          format: double
          description: The execution elapsed hour(s).
          example: 0.04472222222222222
        elapsed_seconds:
          type: integer
          format: int32
          description: The execution elapsed second(s).
          example: 161
        cores_allowed:
          type: number
          format: double
          description: The maximum number of Central Processing Unit cores to use.
          example: 8
        max_parallel_cpus:
          type: integer
          format: int32
          description: The maximum number of used Central Processing Unit cores.
          example: 7
        total_cpu_hours:
          type: number
          format: double
          description: The number of used Central Processing Unit cores per hour.
          example: 0.21305555555555555
        ram_mb_allowed:
          type: number
          format: double
          description: The maximum amount of RAM to use, in MegaBytes.
          example: 4000
        total_ram_megabyte_hours:
          type: number
          format: double
          description: The total size of the RAM used per hour for the execution, in MegaBytes.
          example: 114.3833304177778
        max_parallel_ram_megabytes:
          type: number
          format: double
          example: 3758.0963839999995
        total_disk_megabytes:
          type: number
          format: double
          description: The total size of the Disk used per hour for the execution, in MegaBytes.
          example: 2490.712061999999
        max_parallel_tasks:
          type: integer
          format: int32
          description: The maximum number of parallel executing tasks.
        total_tasks:
          type: integer
          format: int32
          description: The total number of executed tasks.
          example: 25
        children:
          type: array
          items:
            $ref: '#/components/schemas/ChildUsage'
          description: The executed tasks.
          example:
            - cpus: 1
              ram_megabytes: 536.870912
              disk_megabytes: 99.962848
              exit_code: 0
              name: node_crop_6
              start_time: '2025-03-11T16:20:37Z'
              finish_time: '2025-03-11T16:21:25Z'
              elapsed_hours: 0.013333333333333334
              elapsed_seconds: 48
              ram_megabyte_hours: 7.158278826666667
              cpu_hours: 0.013333333333333334
    CompletedData:
      title: CompletedData
      allOf:
        - $ref: '#/components/schemas/BaseData'
        - type: object
          required:
            - job_id
            - process_id
            - usage
            - outputs
          properties:
            usage:
              $ref: '#/components/schemas/Usage'
            outputs:
              type: object
              additionalProperties: true
              description: The dictionary that describes outputs identifiers with related values.
          additionalProperties: false
    ErrorDetail:
      type: object
      description: An object to provide explicit details on a problem towards an API consumer.
      required:
        - detail
      properties:
        detail:
          type: string
          description: A granular description on the specific error related to a body property, query parameter, path parameters, and/or header.
          maxLength: 4096
        pointer:
          type: string
          description: A JSON Pointer to a specific request body property that is the source of error.
          maxLength: 1024
        parameter:
          type: string
          description: The name of the query or path parameter that is the source of error.
          maxLength: 1024
        header:
          type: string
          description: The name of the header that is the source of error.
          maxLength: 1024
        code:
          type: string
          description: A string containing additional provider specific codes to identify the error context.
          maxLength: 50
    Exception:
      title: Exception Schema
      description: |-
        The `exception` object provides detailed information about an errors that occurred during an API call execution. This problem object conforms to the [RFC9457](https://www.rfc-editor.org/info/rfc9457) (formerly [RFC7807](https://tools.ietf.org/html/rfc7807)).
        The object is extended with the following properties: - `code` - a string identifier to aid the provider team better understand the error - `errors` - and array of errors providing contextual information on the root cause of the problem
        The `exception` referenced by this domain utilize a custom Terradue Problems Registry.
      type: object
      required:
        - type
      properties:
        type:
          type: string
          description: A URI reference that identifies the problem type.
          format: uri
          pattern: https://mate.terradue.com/.+
          maxLength: 1024
        status:
          type: integer
          description: The HTTP status code generated by the origin server for this occurrence of the problem.
          format: int32
          minimum: 100
          maximum: 599
        title:
          type: string
          description: A short, human-readable summary of the problem type. It should not change from occurrence to occurrence of the problem, except for purposes of localization.
          maxLength: 1024
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence of the problem.
          maxLength: 4096
        instance:
          type: string
          description: A URI reference that identifies the specific occurrence of the problem. It may or may not yield further information if dereferenced.
          maxLength: 1024
        code:
          type: string
          description: An API specific error code aiding the provider team understand the error based on their own potential taxonomy or registry.
          maxLength: 50
        errors:
          type: array
          description: An array of error details to accompany a problem details response.
          maxItems: 1000
          items:
            $ref: '#/components/schemas/ErrorDetail'
    FailedData:
      title: FailedData
      allOf:
        - $ref: '#/components/schemas/BaseData'
        - type: object
          required:
            - job_id
            - process_id
            - usage
          properties:
            exception:
              $ref: '#/components/schemas/Exception'
            usage:
              $ref: '#/components/schemas/Usage'
          additionalProperties: false
    FeatureCollection:
      $schema: http://json-schema.org/draft-07/schema#
      $id: https://geojson.org/schema/FeatureCollection.json
      title: GeoJSON FeatureCollection
      type: object
      required:
        - type
        - features
      properties:
        type:
          type: string
          enum:
            - FeatureCollection
        features:
          type: array
          items:
            title: GeoJSON Feature
            type: object
            required:
              - type
              - properties
              - geometry
            properties:
              type:
                type: string
                enum:
                  - Feature
              id:
                oneOf:
                  - type: number
                  - type: string
              properties:
                oneOf:
                  - type: 'null'
                  - type: object
              geometry:
                oneOf:
                  - type: 'null'
                  - title: GeoJSON Point
                    type: object
                    required:
                      - type
                      - coordinates
                    properties:
                      type:
                        type: string
                        enum:
                          - Point
                      coordinates:
                        type: array
                        minItems: 2
                        items:
                          type: number
                      bbox:
                        type: array
                        minItems: 4
                        items:
                          type: number
                  - title: GeoJSON LineString
                    type: object
                    required:
                      - type
                      - coordinates
                    properties:
                      type:
                        type: string
                        enum:
                          - LineString
                      coordinates:
                        type: array
                        minItems: 2
                        items:
                          type: array
                          minItems: 2
                          items:
                            type: number
                      bbox:
                        type: array
                        minItems: 4
                        items:
                          type: number
                  - title: GeoJSON Polygon
                    type: object
                    required:
                      - type
                      - coordinates
                    properties:
                      type:
                        type: string
                        enum:
                          - Polygon
                      coordinates:
                        type: array
                        items:
                          type: array
                          minItems: 4
                          items:
                            type: array
                            minItems: 2
                            items:
                              type: number
                      bbox:
                        type: array
                        minItems: 4
                        items:
                          type: number
                  - title: GeoJSON MultiPoint
                    type: object
                    required:
                      - type
                      - coordinates
                    properties:
                      type:
                        type: string
                        enum:
                          - MultiPoint
                      coordinates:
                        type: array
                        items:
                          type: array
                          minItems: 2
                          items:
                            type: number
                      bbox:
                        type: array
                        minItems: 4
                        items:
                          type: number
                  - title: GeoJSON MultiLineString
                    type: object
                    required:
                      - type
                      - coordinates
                    properties:
                      type:
                        type: string
                        enum:
                          - MultiLineString
                      coordinates:
                        type: array
                        items:
                          type: array
                          minItems: 2
                          items:
                            type: array
                            minItems: 2
                            items:
                              type: number
                      bbox:
                        type: array
                        minItems: 4
                        items:
                          type: number
                  - title: GeoJSON MultiPolygon
                    type: object
                    required:
                      - type
                      - coordinates
                    properties:
                      type:
                        type: string
                        enum:
                          - MultiPolygon
                      coordinates:
                        type: array
                        items:
                          type: array
                          items:
                            type: array
                            minItems: 4
                            items:
                              type: array
                              minItems: 2
                              items:
                                type: number
                      bbox:
                        type: array
                        minItems: 4
                        items:
                          type: number
                  - title: GeoJSON GeometryCollection
                    type: object
                    required:
                      - type
                      - geometries
                    properties:
                      type:
                        type: string
                        enum:
                          - GeometryCollection
                      geometries:
                        type: array
                        items:
                          oneOf:
                            - title: GeoJSON Point
                              type: object
                              required:
                                - type
                                - coordinates
                              properties:
                                type:
                                  type: string
                                  enum:
                                    - Point
                                coordinates:
                                  type: array
                                  minItems: 2
                                  items:
                                    type: number
                                bbox:
                                  type: array
                                  minItems: 4
                                  items:
                                    type: number
                            - title: GeoJSON LineString
                              type: object
                              required:
                                - type
                                - coordinates
                              properties:
                                type:
                                  type: string
                                  enum:
                                    - LineString
                                coordinates:
                                  type: array
                                  minItems: 2
                                  items:
                                    type: array
                                    minItems: 2
                                    items:
                                      type: number
                                bbox:
                                  type: array
                                  minItems: 4
                                  items:
                                    type: number
                            - title: GeoJSON Polygon
                              type: object
                              required:
                                - type
                                - coordinates
                              properties:
                                type:
                                  type: string
                                  enum:
                                    - Polygon
                                coordinates:
                                  type: array
                                  items:
                                    type: array
                                    minItems: 4
                                    items:
                                      type: array
                                      minItems: 2
                                      items:
                                        type: number
                                bbox:
                                  type: array
                                  minItems: 4
                                  items:
                                    type: number
                            - title: GeoJSON MultiPoint
                              type: object
                              required:
                                - type
                                - coordinates
                              properties:
                                type:
                                  type: string
                                  enum:
                                    - MultiPoint
                                coordinates:
                                  type: array
                                  items:
                                    type: array
                                    minItems: 2
                                    items:
                                      type: number
                                bbox:
                                  type: array
                                  minItems: 4
                                  items:
                                    type: number
                            - title: GeoJSON MultiLineString
                              type: object
                              required:
                                - type
                                - coordinates
                              properties:
                                type:
                                  type: string
                                  enum:
                                    - MultiLineString
                                coordinates:
                                  type: array
                                  items:
                                    type: array
                                    minItems: 2
                                    items:
                                      type: array
                                      minItems: 2
                                      items:
                                        type: number
                                bbox:
                                  type: array
                                  minItems: 4
                                  items:
                                    type: number
                            - title: GeoJSON MultiPolygon
                              type: object
                              required:
                                - type
                                - coordinates
                              properties:
                                type:
                                  type: string
                                  enum:
                                    - MultiPolygon
                                coordinates:
                                  type: array
                                  items:
                                    type: array
                                    items:
                                      type: array
                                      minItems: 4
                                      items:
                                        type: array
                                        minItems: 2
                                        items:
                                          type: number
                                bbox:
                                  type: array
                                  minItems: 4
                                  items:
                                    type: number
                      bbox:
                        type: array
                        minItems: 4
                        items:
                          type: number
              bbox:
                type: array
                minItems: 4
                items:
                  type: number
        bbox:
          type: array
          minItems: 4
          items:
            type: number
    StagedData:
      title: StagedData
      allOf:
        - $ref: '#/components/schemas/BaseData'
        - type: object
          required:
            - job_id
            - process_id
            - outputs
          properties:
            outputs:
              type: object
              additionalProperties:
                $ref: '#/components/schemas/FeatureCollection'
              description: The dictionary that describes outputs identifiers with related STAC Item value(s).
          additionalProperties: false
    PipedData:
      title: PipedData
      allOf:
        - $ref: '#/components/schemas/BaseData'
        - type: object
          required:
            - job_id
            - process_id
            - entries
          properties:
            entries:
              type: object
              additionalProperties:
                $ref: '#/components/schemas/FeatureCollection'
              description: The dictionary that describes outputs identifiers with related STAC Item value.
          additionalProperties: false
    ChildUsage:
      type: object
      description: Report of a child process execution used resources.
      properties:
        name:
          type: string
          description: The name of the child process.
          example: node_crop_6
        start_time:
          type: string
          format: date-time
          description: |
            The execution start time, in the date-time notation as defined by [RFC 3339, section 5.6](https://datatracker.ietf.org/doc/html/rfc3339#section-5.6).
          example: '2025-03-11T16:20:37Z'
        finish_time:
          type: string
          format: date-time
          description: |
            The execution finish time, in the date-time notation as defined by [RFC 3339, section 5.6](https://datatracker.ietf.org/doc/html/rfc3339#section-5.6).
          example: '2025-03-11T16:21:25Z'
        elapsed_hours:
          type: number
          description: The execution elapsed hour(s).
          example: 0.013333333333333334
        elapsed_seconds:
          type: number
          description: The execution elapsed second(s).
          format: double
          example: 48
        exit_code:
          type: integer
          format: int32
          description: The executed child process exit code.
        cpus:
          type: number
          format: double
          description: The number of Central Processing Unit cores used for the execution.
          example: 1
        cpu_hours:
          type: number
          format: double
          description: The number of Central Processing Unit cores used per hour for the execution.
          example: 0.013333333333333334
        ram_megabytes:
          type: number
          format: double
          description: The size of the RAM used for the execution, in MegaBytes.
          example: 536.870912
        ram_megabyte_hours:
          type: number
          format: double
          description: The size of the RAM used per hour for the execution, in MegaBytes.
          example: 7.158278826666667
        disk_megabytes:
          type: number
          format: double
          description: The size of the Disk used for the execution, in MegaBytes.
          example: 99.962848
  responses:
    WebhookOk:
      description: The Webhook successfully enqueued the CloudEvent.
      content:
        text/plain:
          schema:
            type: string
          examples:
            default:
              value: success
  examples:
    Calendar:
      summary: Calendar
      value:
        source: seda:workflows:scan-calendar:5s
        type: calendar-event
        subject: workflows:scan-calendar:5s
        partitionkey: workflows:scan-calendar:5s
        data:
          namespace: alice
          end_time: '2026-02-10T13:32:13Z'
          event_time: '2026-02-10T13:32:13Z'
          start_time: '2026-02-10T13:32:08Z'
    Prepared:
      summary: Prepared
      value:
        source: seda-dev-platform:workflows:pattern-1-v0-2-0:get-results
        type: prepared
        subject: workflows:10d6fec5-b064-4373-bb60-5060ce39d682:pattern-1-v0-2-0-62cpk
        partitionkey: workflows:10d6fec5-b064-4373-bb60-5060ce39d682:pattern-1-v0-2-0-62cpk
        data:
          job_id: pattern-1
          namespace: alice
          inputs:
            aoi: '-118.985,38.432,-118.183,38.938'
            epsg: EPSG:4326
            bands:
              - green
              - nir08
            item: https://raw.githubusercontent.com/stac-utils/stac-examples/refs/heads/main/sentinel2/sentinel2-sample.json
    Completed:
      summary: Completed
      value:
        source: seda-dev-platform:workflows:pattern-1-v0-2-0:get-results
        type: completed
        subject: workflows:10d6fec5-b064-4373-bb60-5060ce39d682:pattern-1-v0-2-0-62cpk
        partitionkey: workflows:10d6fec5-b064-4373-bb60-5060ce39d682:pattern-1-v0-2-0-62cpk
        data:
          job_id: pattern-1
          namespace: alice
          usage:
            cores_allowed: 8
            ram_mb_allowed: 4000
            children:
              - cpus: 1
                ram_megabytes: 536.870912
                disk_megabytes: 99.962848
                exit_code: 0
                name: node_crop_6
                start_time: '2025-03-11T16:20:37+00:00'
                finish_time: '2025-03-11T16:21:25+00:00'
                elapsed_hours: 0.013333333333333334
                elapsed_seconds: 48
                ram_megabyte_hours: 7.158278826666667
                cpu_hours: 0.013333333333333334
            start_time: '2025-03-11T16:20:36+00:00'
            finish_time: '2025-03-11T16:23:17+00:00'
            elapsed_hours: 0.04472222222222222
            elapsed_seconds: 161
            total_cpu_hours: 0.21305555555555555
            total_ram_megabyte_hours: 114.3833304177778
            total_disk_megabytes: 2490.712061999999
            total_tasks: 25
            max_parallel_cpus: 7
            max_parallel_ram_megabytes: 3758.0963839999995
            max_parallel_tasks: 0
          outputs:
            water_bodies: https://raw.githubusercontent.com/stac-utils/stac-examples/refs/heads/main/sentinel2/sentinel2-sample.json
    Failed:
      summary: Failed
      value:
